worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Cấu hình Load Balancing: Gửi request tới máy chủ Node (host)
    upstream docshare_backend {
        # Sử dụng host.docker.internal để docker giao tiếp với máy chủ gốc
        server host.docker.internal:3000;
    }

    # 1. BLOCK TỰ ĐỘNG CHUYỂN HTTP SANG HTTPS
    server {
        listen       80;
        server_name  ngocson2g.id.vn www.ngocson2g.id.vn;

        # Tự động redirect sạch sẽ mọi request sang HTTPS
        return 301 https://$host$request_uri;
    }

    # 2. BLOCK CHÍNH CHẠY HTTPS (PORT 443)
    server {
        listen       443 ssl;
        server_name  ngocson2g.id.vn www.ngocson2g.id.vn;

        # Đường dẫn trỏ tới chứng chỉ SSL được mount vào container
        ssl_certificate      /etc/letsencrypt/live/ngocson2g.id.vn/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/ngocson2g.id.vn/privkey.pem;

        # Cấu hình tối ưu hóa bảo mật SSL
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;

        # GZIP cho hiệu suất nhanh hơn
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # Chặn giới hạn kích thước file upload (100MB)
        client_max_body_size 100M;
        # Root -> redirect mặc định sang /docshare/
        location = / {
            return 301 /docshare/;
        }

        # ===== APP: DOCSHARE =====
        location ^~ /docshare/ {
            alias /usr/share/nginx/html/;
            index index.html index.htm;
            
            # Khắc phục lỗi try_files với alias: chỉ định đúng đường dẫn tuyệt đối
            try_files $uri $uri/ @docshare_ui;
        }

        location @docshare_ui {
            root /usr/share/nginx/html;
            rewrite ^ /index.html break;
        }

        # Phục vụ file tải lên
        location /docshare/uploads/ {
            proxy_pass http://docshare_backend/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme; # Giúp backend nhận diện kết nối đã bảo mật
        }

        # Load balancer cho API
        location /docshare/api/ {
            proxy_pass http://docshare_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # Chuyển tiếp IP thật của client (quan trọng cho Rate Limit)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme; # Giúp backend nhận diện kết nối đã bảo mật
        }

        location ~* ^/downloads/(?<filename>.+)$ {
            alias /var/www/downloads/$filename;

            # Bật autoindex để dễ debug
            autoindex on;

            # Ép tải file xuống và đặt tên chuẩn bằng biến cục bộ $filename vừa bắt được
            add_header Content-Type "text/csv; charset=utf-8";
            add_header Content-Disposition "attachment; filename=\"$filename\"";

            # Khắc phục lỗi CORS cho App
            add_header Access-Control-Allow-Origin *;
        }
    }
}
