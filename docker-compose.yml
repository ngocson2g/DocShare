version: '3.8'

services:
  mongodb:
    image: mongo:4.4
    container_name: docshare_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - docshare_mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=docshare

  redis:
    image: redis:7-alpine
    container_name: docshare_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - docshare_redis_data:/data

  app:
    build: .
    container_name: docshare_app
    restart: always
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/docshare
      - REDIS_URI=redis://redis:6379
      - NODE_ENV=production
    volumes:
      - ./data:/usr/src/app/data
    depends_on:
      - mongodb
      - redis

  nginx:
    image: nginx:alpine
    container_name: docshare_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/downloads:/var/www/downloads:ro
    depends_on:
      - app

volumes:
  docshare_mongo_data:
  docshare_redis_data:
